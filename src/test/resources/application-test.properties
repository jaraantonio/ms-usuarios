spring.application.name=ms-usuarios-test

# H2 en memoria para pruebas
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA con H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# data.sql no se ejecuta en test (H2 no soporta INSERT IGNORE)
spring.sql.init.mode=never

# MS Notificaciones URL (mock)
ms-notificaciones.url=http://localhost:8089

# Logs mínimos en test
logging.level.org.springframework=WARN
logging.level.com.perfulandia=DEBUG